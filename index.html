<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Watch Futurista</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="description" content="Relógio digital futurista com cronômetro, clima e horários internacionais.">

</head>

<body>
  <div class="container">
    <div class="weather-box">
      <h2>🌤️ Tempo Agora</h2>
      <p id="weather">Carregando previsão...</p>
    </div>

    <div class="clock">
      <h1 id="hour" class="hover-glow">--:--:--</h1>
      <p id="date" class="hover-glow">loading date...</p>

      <div id="timer" style="display: none;">
        <h1 id="time">00:00:00.00</h1>
        <div class="botoes">
          <button onclick="start()" class="botao-global">Start</button>
          <button onclick="pause()" class="botao-global">Pause</button>
          <button onclick="reset()" class="botao-global">Reset</button>
        </div>
      </div>

      <div style="margin-top: 20px;">
        <button id="change-mode" class="botao-global">Use Watch</button>
        <button id="toggle-theme" class="botao-global">Change Theme</button>
      </div>
    </div>
  </div>

  <footer>
    <div class="timebox hover-glow" id="london">London: --:--:--</div>
    <div class="timebox hover-glow" id="newyork">New York: --:--:--</div>
    <div class="timebox hover-glow" id="tokyo">Tokyo: --:--:--</div>
    <div class="timebox hover-glow" id="sydney">Sydney: --:--:--</div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
